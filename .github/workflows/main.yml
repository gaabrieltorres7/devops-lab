name: Deploy to Kubernetes

on:
  push:
    branches:
      - master

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: devops-lab-ecr
  EKS_CLUSTER_NAME: devops-lab-cluster
  AWS_ROLE_ARN: arn:aws:iam::867732292235:role/devops-lab-gh-actions-oidc-role

jobs:
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.ref == 'refs/heads/master' && github.event_name != 'pull_request'

    permissions:
      id-token: write
      contents: read

    outputs:
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
      registry: ${{ steps.tags.outputs.registry }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tags
        id: tags
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_tag=$SHA_SHORT" >> $GITHUB_OUTPUT
          echo "registry=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (without push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ steps.tags.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.tags.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{
            steps.tags.outputs.sha_tag }}
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Push to ECR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tags.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.tags.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.tags.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: always()
        run: |
          echo "### Image pushed to ECR" >> $GITHUB_STEP_SUMMARY
          echo "**Registry:** ${{ steps.tags.outputs.registry }}/${{ env.ECR_REPOSITORY }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:** \`latest\` | \`${{ steps.tags.outputs.sha_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-push

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{
          env.EKS_CLUSTER_NAME }}

      - name: Deploy to EKS
        run: |
          helm upgrade --install devops-lab k8s/charts/devops-lab/ \
            --set image.tag=${{ needs.build-and-push.outputs.sha_tag }}

      - name: Summary
        if: always()
        run: |
          echo "### Deployed to EKS" >> $GITHUB_STEP_SUMMARY
          echo "**Image tag:** \`${{ needs.build-and-push.outputs.sha_tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
